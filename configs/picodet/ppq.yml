_BASE_: [
  '../datasets/voc_ppq.yml',
  '../runtime.yml',
  '_base_/picodet_v2.yml',
  '_base_/optimizer_300e.yml',
  '_base_/picodet_640_reader.yml',
]

pretrain_weights: ""
find_unused_parameters: True
use_ema: true
epoch: 50
snapshot_epoch: 5

LCNet:
  scale: 2.0
  feature_maps: [2, 3, 4, 5]

LCPAN:
  out_channels: 160

PicoFeat:
  feat_in: 160
  feat_out: 160
  num_convs: 4
  num_fpn_stride: 3
  norm_type: bn
  share_cls_reg: True
  use_se: True

PicoHeadV2:
  conv_feat:
    name: PicoFeat
    feat_in: 160
    feat_out: 160
    num_convs: 4
    num_fpn_stride: 3
    norm_type: bn
    share_cls_reg: True
    use_se: True
  feat_in_chan: 160
  fpn_stride: [4, 8, 16]

LearningRate:
  base_lr: 0.01
  schedulers:
    - !CosineDecay
      max_epochs: 100
    - !LinearWarmup
      start_factor: 0.1
      steps: 200

TrainReader:
  batch_size: 5